name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend_quality_gates_macos:
    name: backend-quality-gates-macos
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: bash tools/scripts/init_submodules.sh

      - name: Configure (Debug)
        run: >
          cmake -S . -B build -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Debug
          -DDNB_ENABLE_PLUGIN_TARGET=ON
          -DDNB_BUILD_TESTS=ON
          -DDNB_BUILD_BENCH=ON

      - name: Build (verbose, bounded parallelism)
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build --parallel 2 --verbose

      - name: Frontend contract guards
        run: bash tools/scripts/check_frontend_contracts.sh

      - name: Frontend asset integrity guards
        run: bash tools/scripts/check_frontend_assets.sh

      - name: Frontend DAW regression guards
        run: bash tools/scripts/check_frontend_daw_guards.sh

      - name: Backend test binaries coverage
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for bin in domain_tests engine_tests dsp_tests render_tests preset_tests; do
            if [[ ! -x "./build/tests/${bin}" ]]; then
              missing+=("${bin}")
              continue
            fi
            echo "Found backend test binary: ./build/tests/${bin}"
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing backend test binaries: ${missing[*]}"
            exit 1
          fi
          ctest -N --test-dir build

      - name: CTest full suite
        run: cd build && ctest --output-on-failure

      - name: Package macOS Debug VST3 artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir=""
          if [[ -d "build/DnBBassSynth_artefacts/Debug/VST3" ]]; then
            artifact_dir="build/DnBBassSynth_artefacts/Debug/VST3"
          elif [[ -d "build/DnBBassSynth_artefacts/VST3" ]]; then
            artifact_dir="build/DnBBassSynth_artefacts/VST3"
          fi
          if [[ -z "${artifact_dir}" ]]; then
            echo "Expected VST3 artifact directory not found."
            exit 1
          fi
          mkdir -p build/ci_bundle
          zip -r build/ci_bundle/DnBBassSynth_macos_debug_vst3.zip "${artifact_dir}"

      - name: Upload macOS Debug VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-macos-debug-vst3
          path: build/ci_bundle/DnBBassSynth_macos_debug_vst3.zip

  backend_quality_gates_windows:
    name: backend-quality-gates-windows
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        shell: bash
        run: bash tools/scripts/init_submodules.sh

      - name: Configure (Debug, Visual Studio 2022)
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DDNB_ENABLE_PLUGIN_TARGET=OFF
          -DDNB_BUILD_TESTS=ON
          -DDNB_BUILD_BENCH=OFF

      - name: Build (Debug)
        run: cmake --build build --config Debug --parallel

      - name: Backend test binaries coverage
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bins = @("domain_tests","engine_tests","dsp_tests","render_tests","preset_tests")
          $missing = @()
          foreach ($bin in $bins) {
            $candidate = Get-ChildItem -Path build/tests/Debug -Filter "$bin.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $candidate) {
              $candidate = Get-ChildItem -Path build -Recurse -Filter "$bin.exe" -File | Select-Object -First 1
            }
            if (-not $candidate) {
              $missing += "$bin.exe"
              continue
            }
            Write-Host "Found backend test binary: $($candidate.FullName)"
          }
          if ($missing.Count -gt 0) {
            throw "Missing backend test binaries: $($missing -join ', ')"
          }
          ctest -N -C Debug --test-dir build

      - name: CTest full suite
        run: cd build && ctest -C Debug --output-on-failure

  bench_evidence_debug:
    name: bench-evidence-debug-non-blocking
    needs: backend_quality_gates_macos
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: bash tools/scripts/init_submodules.sh

      - name: Configure (Debug bench evidence)
        run: >
          cmake -S . -B build -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Debug
          -DDNB_ENABLE_PLUGIN_TARGET=OFF
          -DDNB_BUILD_TESTS=OFF
          -DDNB_BUILD_BENCH=ON

      - name: Build bench targets
        run: >
          cmake --build build --parallel 2
          --target bench_voice_cpu bench_oversampling bench_macro_updates

      - name: Run bench evidence (non-blocking)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p build/bench_evidence
          {
            echo "Measurement context: Debug (non-blocking evidence job)"
            echo "Command: ./bench/bench_voice_cpu --benchmark_min_time=0.05s --benchmark_repetitions=1"
            ./build/bench/bench_voice_cpu --benchmark_min_time=0.05s --benchmark_repetitions=1
            echo
            echo "Command: ./bench/bench_oversampling --benchmark_min_time=0.05s --benchmark_repetitions=1"
            ./build/bench/bench_oversampling --benchmark_min_time=0.05s --benchmark_repetitions=1
            echo
            echo "Command: ./bench/bench_macro_updates --benchmark_min_time=0.05s --benchmark_repetitions=1"
            ./build/bench/bench_macro_updates --benchmark_min_time=0.05s --benchmark_repetitions=1
          } 2>&1 | tee build/bench_evidence/bench_debug.log

      - name: Upload bench evidence log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-evidence-debug
          path: build/bench_evidence/bench_debug.log
