name: formatting-and-lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  format-check:
    name: format-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run clang-format dry-run gate
        run: bash tools/scripts/format.sh --check

  lint-check:
    name: lint-check
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            ninja-build \
            ripgrep \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libglu1-mesa-dev \
            libcurl4-openssl-dev

      - name: Init submodules
        run: bash tools/scripts/init_submodules.sh

      - name: Configure compile commands for lint
        run: >
          cmake -S . -B build_lint -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DDNB_ENABLE_PLUGIN_TARGET=OFF
          -DDNB_BUILD_TESTS=ON
          -DDNB_BUILD_BENCH=OFF

      - name: Run clang-tidy lint gate
        run: bash tools/scripts/lint.sh --build-dir build_lint
